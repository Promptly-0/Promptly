<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promptly Admin - Waitlist</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- jsPDF and AutoTable for PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --border-color: #e2e8f0;
            --primary: #4f46e5;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        h1 { margin: 0; font-size: 1.5rem; }
        
        #auth-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 300px;
            margin: 4rem auto;
        }
        input {
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
        }
        button {
            padding: 0.75rem 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        button:hover { opacity: 0.9; }
        button.secondary { background: #64748b; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        th { background: #f1f5f9; font-weight: 600; }
        
        #dashboard { display: none; }
        .controls { display: flex; gap: 1rem; }
    </style>
</head>
<body>

    <div id="auth-section" class="container">
        <h2>Admin Access</h2>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
        <button onclick="login()">Access Dashboard</button>
        <p id="error-msg" style="color: red; font-size: 0.875rem; display: none;">Incorrect password</p>
    </div>

    <div id="dashboard" class="container">
        <div class="header">
            <h1>Waitlist Emails</h1>
            <div class="controls">
                <button class="secondary" onclick="exportCSV()"><i data-lucide="file-spreadsheet"></i> Export CSV</button>
                <button class="secondary" onclick="exportPDF()"><i data-lucide="file-text"></i> Export PDF</button>
            </div>
        </div>
        
        <table id="emails-table">
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Date Signed Up</th>
                </tr>
            </thead>
            <tbody>
                <!-- Populated via JS -->
            </tbody>
        </table>
    </div>

    <script>
        lucide.createIcons();
        let emailData = [];

        async function login() {
            const pwd = document.getElementById('password').value;
            try {
                const res = await fetch('/api/emails', {
                    headers: { 'Authorization': `Bearer ${pwd}` }
                });
                
                if (res.ok) {
                    const data = await res.json();
                    emailData = data.emails;
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    renderTable();
                } else {
                    document.getElementById('error-msg').style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                alert("Failed to connect to server.");
            }
        }

        function renderTable() {
            const tbody = document.querySelector('#emails-table tbody');
            tbody.innerHTML = '';
            emailData.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${escapeHTML(row.email)}</td>
                    <td>${new Date(row.createdAt).toLocaleString()}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }

        function exportCSV() {
            if (!emailData.length) return alert('No data to export');
            let csvContent = "data:text/csv;charset=utf-8,Email,CreatedAt\n";
            emailData.forEach(row => {
                csvContent += `${row.email},${row.createdAt}\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "promptly_waitlist.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function exportPDF() {
            if (!emailData.length) return alert('No data to export');
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.text("Promptly Waitlist", 14, 15);
            
            const tableColumn = ["Email", "Date Signed Up"];
            const tableRows = [];

            emailData.forEach(row => {
                const rowData = [
                    row.email,
                    new Date(row.createdAt).toLocaleString()
                ];
                tableRows.push(rowData);
            });

            doc.autoTable({
                head: [tableColumn],
                body: tableRows,
                startY: 20
            });

            doc.save('promptly_waitlist.pdf');
        }
    </script>
</body>
</html>
